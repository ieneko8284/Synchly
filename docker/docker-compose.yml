name: synchly

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: synchly_app
    environment:
      DB_HOST: db
      DB_DATABASE: synchly_db
      DB_USERNAME: root
      DB_PASSWORD: next123
    volumes:
      - ../:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:1.27-alpine
    container_name: synchly_web
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.4
    container_name: synchly_db
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: synchly_db
      MYSQL_ROOT_PASSWORD: next123
      TZ: Asia/Tokyo
    volumes:
      - db_data:/var/lib/mysql
      - ../database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ../database/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  db_data:
